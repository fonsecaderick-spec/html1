<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resumo do Cadastro - Agro Forte</title>
    <link rel="stylesheet" href="estilo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="cadastro-produtor">
    <h2>Cadastro Concluído 🌱</h2>

    <div class="resumo">

        <p><strong>Localização:</strong> <span id="resumo-local"></span></p>
        <p><strong>Produtos:</strong> <span id="resumo-produto"></span></p>
        <p><strong>Telefone:</strong> <span id="resumo-contato"></span></p>
        <p><strong>Email:</strong> <span id="resumo-email"></span></p>
        <p><strong>Foto do Produto:</strong></p>
        <img id="resumo-foto" style="display:none; max-width:300px; margin-top:10px;">
    </div>

    <br>
    <a href="index.html">Voltar para o Início</a>
</div>
