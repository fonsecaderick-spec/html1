<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtor - Agro Forte</title>
    <link rel="stylesheet" href="estilo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="cadastro-produtor" id="bloco-cadastro">
        <h2 id="boas-vindas-nome">Seja um Parceiro 🌱</h2>
        <h2>Cadastre sua fazenda familiar e venda seus produtos direto para os clientes!</h2>
        
        <form id="formCadastro" action="conclusao.html">

           <div class="campo">
    <label for="nome-fazenda">Nome do Produtor:</label>
    <input type="text" id="nome-fazenda" placeholder="Ex: joão" required>
</div>

<div class="campo">
    <label for="localizacao">De onde você é? (Cidade e Estado):</label>
    <input type="text" id="localizacao" placeholder="Ex: Maringá - PR" required>
</div>

<div class="campo">
    <label for="produtos">O que você produz/vende?</label>
    <input type="text" id="produtos" placeholder="Ex: Alface orgânica, mel, ovos" required>
</div>

<div class="campo">
    <label for="telefone">Telefone ou WhatsApp de Contato:</label>
    <input type="tel" id="telefone" placeholder="Ex: (44) 99999-9999" required>
</div>

<div class="campo">
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Ex: coxinha123@gmail.com" required>
</div>

<div class="campo">
    <label for="senha">Senha:</label>
    <input type="password" id="senha" placeholder="Ex: 123456789" required>
</div>

<div class="campo">
    <label for="foto-produto">Foto do seu Produto (Obrigatório):</label>
    <input type="file" id="foto-produto" accept="image/*" required>
</div>
<div>
<button type="submit" class="termina-cadastro">Termina cadastro</button>
    </div>
        </form>
        
        <br>
        <a href="index.html" class="link-voltar" required>Voltar para o Início</a>
    </div>

    <form id="formComprador" class="formulario-aba">
        <h2>Seja bem-vindo! 🌱</h2>
        <p>Cadastre-se para apoiar a agricultura familiar e comprar direto do produtor.</p>
        
        <label>Nome Completo:</label>
        <input type="text" id="nome-comprador" placeholder="Ex: Maria Silva" required>
        
        <label>Cidade e Estado:</label>
        <input type="text" id="localizacao-comprador" placeholder="Ex: Maringá - PR" required>
        
        <label>Telefone ou WhatsApp:</label>
        <input type="text" id="telefone-comprador" placeholder="Ex: (44) 99999-9999" required>
        
        <label>Email:</label>
        <input type="email" id="email-comprador" placeholder="Ex: maria@gmail.com" required>
        
        <label>Senha:</label>
        <input type="password" id="senha-comprador" placeholder="Ex: 123456789" required>

        <button type="submit" class="btn-enviar">Terminar cadastro</button>
    </form>

    <div class="links-fundo">
        <a href="index.html">Voltar para o Início</a>
    </div>
</div>


    <script src="animação.js"></script>
</body>
</html>
