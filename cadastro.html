<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtor - Agro Forte</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="cadastro-produtor" id="bloco-cadastro">
        <h2 id="boas-vindas-nome">Seja um Parceiro 🌱</h2>
        <p>Cadastre sua fazenda familiar e venda seus produtos direto para os clientes!</p>
        
        <form id="formCadastro">

            <div class="campo">
            <label for="nome-fazenda">Nome da Fazenda / Produtor:</label>
            <input type="text" id="nome-fazenda" placeholder="Ex: Sítio Primavera" required>
</div>


            <div class="campo">
            <label for="localizacao">De onde você é? (Cidade e Estado):</label>
            <input type="text" id="localizacao" placeholder="Ex: Maringá - PR" required>
            </div>


<div class="campo">
            <label for="produtos">O que você produz/vende?</label>
            <input type="text" id="produtos" placeholder="Ex: Alface orgânica, mel, ovos" required>
            </div>


<div class="campo">
            <label for="contato"> Telefone ou WhatsApp de Contato:</label>
            <input type="tel" id="contato" placeholder="Ex: (44) 99999-9999" required>
            </div>


<div class="campo">
            <label for="contato"> email:</label>
            <input type="tel" id="contato" placeholder="Ex: coxinha123@gmail.com" required>
            </div>


<div class="campo">
            <label for="foto-produto">Foto do seu Produto (Obrigatório):</label>
            <input type="file" id="foto-produto" accept="image/*" required>
</div>
            <button type="submit">Finalizar Cadastro</button>
        </form>
        
        <br>
        <a href="index.html" class="link-voltar">Voltar para o Início</a>
    </div>

    <div class="footer">
        <p>© 2026 - Agro Forte Sustentável</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
