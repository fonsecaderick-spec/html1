<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        body{
            background-color: darkgreen;
         height: 100vh;   
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }
        .login-box{
            width: 340px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px gray;
            display: grid;
            gap: 16px
            
        }
        form{
            display: grid;
            gap: 10px;
        }
        h2{
        color: green;
            text-align: center;
            magin-top: 0;
        }
        input{
         padding: 10px;
            border-radius: 4px;
            border: 1px solid green;
            outline: none;
        }
        input:focus{
            border-color: darkgreen;
            
        }
        input[type="submit"]{
          background-color:green;
          color: greeen;
            font-size: 16px;
        }
        input[type="submit"]:hover{
            cursor: pointer;
            opacity: 0.9;
            text-decoration: none;
        }
        a{
           font-size: 12px;
            text-align: center;
        }
    </style>
</head>
    <body>
        <div class="login-box">
            <h2>Login</h2>
            <form>
                <input type="email" placeholder="E-mail">
                <input type="password" placeholder="Senha">
                <input type="submit" value="Entrar">
            </form>
            <a href="cadastro.html"color="green">ainda não possui cadastro ?</a>
        </div>

            <a type="submit">Entrar</a>
        </form>
        </div>
        <script src="animação.js"></script>
</body>
</html>
